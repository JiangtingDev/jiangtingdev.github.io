<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <title>将庭服服务器状态</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <link rel="stylesheet" href="/assets/styles/switch.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e0e0e0;
        }
        p {
            padding: 18px 0 18px 0;
            font-size: 20px;
            color: #003333;
        }
        .status {
            border-radius: 25px;
            padding: 0 26px 0 26px;
            box-shadow: 8px 8px 8px #0000004D,
                -8px -8px 8px #FFFFFFB2;
        }
        .logo {
            display: block;
            margin: 0 auto;
        }
        .checkbox-wrapper-35 {
            height: 40px;
            padding: 0 102px;
            transform: scale(1.3, 1.3);
        }
    </style>
</head>
<body>
    <img class="logo" alt="" src="/assets/images/logo.webp">
    <div class="status">
        <p id="data">
            游玩地址：<br/>
            游玩端口：<br/>
            游戏版本：<br/>
            在线人数：<br/>
            数据时间：
        </p>
    </div>
    <div class="checkbox-wrapper-35">
        <input value="private" name="switch" id="switch" type="checkbox" class="switch">
        <label for="switch">
            <span class="switch-x-text">自动刷新</span>
            <span class="switch-x-toggletext">
                <span class="switch-x-unchecked"><span class="switch-x-hiddenlabel">Unchecked: </span>关闭</span>
                <span class="switch-x-checked"><span class="switch-x-hiddenlabel">Checked: </span>开启</span>
            </span>
        </label>
    </div>
    <script src="/assets/scripts/status.js"></script>
</body>
</html>
